name: Release

on:
  push:
    branches: [main]

jobs:
  # ── @fineanmol/holiday-optimizer (root package) ──────────────────────────
  release-optimizer:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm install

      - name: Determine version bump (commits touching root package)
        id: bump
        run: |
          LAST_TAG=$(git tag --list "holiday-optimizer/v*" --sort=-version:refname | head -1 || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "${LAST_TAG}..HEAD" --format="%s" -- . ':!packages/')
          else
            COMMITS=$(git log --format="%s" -- . ':!packages/')
          fi

          echo "Commits since last optimizer tag:"
          echo "$COMMITS"

          BUMP="patch"
          if echo "$COMMITS" | grep -qE "^.+(\(.+\))?!:|BREAKING[- ]CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\([^)]*\))?:"; then
            BUMP="minor"
          fi

          # Nothing relevant changed — skip
          if [ -z "$(echo "$COMMITS" | tr -d '[:space:]')" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No commits for this package — skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "bump=$BUMP" >> $GITHUB_OUTPUT
            echo "Version bump: $BUMP"
          fi

      - name: Bump version
        id: version
        if: steps.bump.outputs.skip != 'true'
        run: |
          NEW_VER=$(npm version ${{ steps.bump.outputs.bump }} --no-git-tag-version)
          echo "new_version=${NEW_VER}" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VER"

      - name: Publish to npm
        if: steps.bump.outputs.skip != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit, tag, and push
        if: steps.bump.outputs.skip != 'true'
        run: |
          git add package.json
          git commit -m "chore(release): holiday-optimizer ${{ steps.version.outputs.new_version }} [skip ci]"
          git tag "holiday-optimizer/${{ steps.version.outputs.new_version }}"
          git push origin main --follow-tags

  # ── @fineanmol/public-holidays (packages/public-holidays) ────────────────
  release-public-holidays:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    # Run after optimizer so both don't push at the same moment
    needs: release-optimizer

    permissions:
      contents: write
      id-token: write

    defaults:
      run:
        working-directory: packages/public-holidays

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Determine version bump (commits touching packages/public-holidays)
        id: bump
        run: |
          LAST_TAG=$(git -C ../.. tag --list "public-holidays/v*" --sort=-version:refname | head -1 || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git -C ../.. log "${LAST_TAG}..HEAD" --format="%s" -- packages/public-holidays/)
          else
            COMMITS=$(git -C ../.. log --format="%s" -- packages/public-holidays/)
          fi

          echo "Commits since last public-holidays tag:"
          echo "$COMMITS"

          BUMP="patch"
          if echo "$COMMITS" | grep -qE "^.+(\(.+\))?!:|BREAKING[- ]CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\([^)]*\))?:"; then
            BUMP="minor"
          fi

          if [ -z "$(echo "$COMMITS" | tr -d '[:space:]')" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No commits for this package — skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "bump=$BUMP" >> $GITHUB_OUTPUT
            echo "Version bump: $BUMP"
          fi

      - name: Bump version
        id: version
        if: steps.bump.outputs.skip != 'true'
        run: |
          NEW_VER=$(npm version ${{ steps.bump.outputs.bump }} --no-git-tag-version)
          echo "new_version=${NEW_VER}" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VER"

      - name: Publish to npm
        if: steps.bump.outputs.skip != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit, tag, and push
        if: steps.bump.outputs.skip != 'true'
        run: |
          git -C ../.. add packages/public-holidays/package.json
          git -C ../.. commit -m "chore(release): public-holidays ${{ steps.version.outputs.new_version }} [skip ci]"
          git -C ../.. tag "public-holidays/${{ steps.version.outputs.new_version }}"
          git -C ../.. pull --rebase origin main   # pick up any optimizer commit
          git -C ../.. push origin main --follow-tags
